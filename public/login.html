<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Value Creating Teams</title>
  <style>
    :root {
      --navy: #1B2A4A;
      --navy-light: #2C3E6B;
      --teal: #00897B;
      --teal-dark: #006B5E;
      --gold: #D4A843;
      --coral: #E07A5F;
      --purple: #7C5CBF;
      --bg: #F5F7FA;
      --card: #FFFFFF;
      --text: #1B2A4A;
      --text-secondary: #5A6B8A;
      --border: #E2E8F0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1B2A4A 0%, #2C3E6B 50%, #006B5E 100%);
      color: var(--text);
    }

    .auth-card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 4px 16px rgba(0, 0, 0, 0.1);
      width: 90%;
      max-width: 420px;
      padding: 40px 36px 36px;
    }

    .auth-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .auth-subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      transition: color 0.25s;
    }

    .auth-tab:hover {
      color: var(--navy);
    }

    .auth-tab.active {
      color: var(--coral);
    }

    .auth-tab.active::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -2px;
      height: 2px;
      background: var(--coral);
      border-radius: 1px;
    }

    /* Forms */
    .auth-form {
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .auth-form.active {
      display: block;
      opacity: 1;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 0.95rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input::placeholder {
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .form-group input:focus {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.15);
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 13px 0;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--coral);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 6px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #c9694f;
    }

    .btn-primary:active:not(:disabled) {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-primary .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .form-footer {
      text-align: center;
      margin-top: 16px;
    }

    .form-footer a,
    .form-footer button {
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }

    .form-footer a:hover,
    .form-footer button:hover {
      color: var(--coral);
    }

    /* Messages */
    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }

    .message.error {
      display: block;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .message.success {
      display: block;
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 24px 28px;
      }

      .auth-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <h1 class="auth-title">Value Creating Teams</h1>
    <p class="auth-subtitle">Facilitation platform for strategic team exercises</p>

    <!-- Tabs (hidden on forgot password) -->
    <div class="auth-tabs" id="authTabs">
      <button class="auth-tab active" data-tab="signin" onclick="showForm('signin')">Sign In</button>
      <button class="auth-tab" data-tab="signup" onclick="showForm('signup')">Sign Up</button>
    </div>

    <!-- Sign In -->
    <form class="auth-form active" id="form-signin" onsubmit="handleSignIn(event)">
      <div id="msg-signin"></div>
      <div class="form-group">
        <label for="si-email">Email</label>
        <input type="email" id="si-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="si-password">Password</label>
        <input type="password" id="si-password" placeholder="Your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="btn-signin">Sign In</button>
      <div class="form-footer">
        <button type="button" onclick="showForm('forgot')">Forgot password?</button>
      </div>
    </form>

    <!-- Sign Up -->
    <form class="auth-form" id="form-signup" onsubmit="handleSignUp(event)">
      <div id="msg-signup"></div>
      <div class="form-group">
        <label for="su-invite">Invitation Code</label>
        <input type="text" id="su-invite" placeholder="Enter your invitation code" required autocomplete="off" style="letter-spacing:1px;font-weight:600;">
      </div>
      <div class="form-group">
        <label for="su-name">Full Name</label>
        <input type="text" id="su-name" placeholder="Jane Smith" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="su-email">Email</label>
        <input type="email" id="su-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="su-password">Password</label>
        <input type="password" id="su-password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="su-confirm">Confirm Password</label>
        <input type="password" id="su-confirm" placeholder="Re-enter your password" required minlength="6" autocomplete="new-password">
      </div>
      <button type="submit" class="btn-primary" id="btn-signup">Create Account</button>
    </form>

    <!-- Forgot Password -->
    <form class="auth-form" id="form-forgot" onsubmit="handleForgot(event)">
      <div id="msg-forgot"></div>
      <div class="form-group">
        <label for="fp-email">Email</label>
        <input type="email" id="fp-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="btn-primary" id="btn-forgot">Send Reset Link</button>
      <div class="form-footer">
        <button type="button" onclick="showForm('signin')">Back to Sign In</button>
      </div>
    </form>
  </div>

  <script type="module" src="supabase-config.js"></script>
  <script>
    // --- Helpers ---
    async function getClient() {
      for (let i = 0; i < 30; i++) {
        if (window.supabaseClient) return window.supabaseClient;
        await new Promise(r => setTimeout(r, 100));
      }
      return null;
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.className = 'message ' + type;
      el.textContent = text;
      el.style.display = 'block';
    }

    function clearMsg(id) {
      const el = document.getElementById(id);
      el.className = 'message';
      el.textContent = '';
      el.style.display = 'none';
    }

    function setLoading(btnId, loading, label) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="spinner"></span>Please wait...'
        : label;
    }

    // --- Form Switching ---
    function showForm(name) {
      const forms = document.querySelectorAll('.auth-form');
      const tabs = document.querySelectorAll('.auth-tab');
      const tabBar = document.getElementById('authTabs');

      // Clear all messages
      ['msg-signin', 'msg-signup', 'msg-forgot'].forEach(clearMsg);

      forms.forEach(f => {
        f.classList.remove('active');
        f.style.opacity = '0';
      });

      tabs.forEach(t => t.classList.remove('active'));

      if (name === 'forgot') {
        tabBar.style.display = 'none';
      } else {
        tabBar.style.display = 'flex';
        const activeTab = document.querySelector(`.auth-tab[data-tab="${name}"]`);
        if (activeTab) activeTab.classList.add('active');
      }

      const target = document.getElementById('form-' + name);
      // Small delay so the display:block registers before opacity transition
      requestAnimationFrame(() => {
        target.classList.add('active');
        requestAnimationFrame(() => {
          target.style.opacity = '1';
        });
      });
    }

    // --- Sign In ---
    async function handleSignIn(e) {
      e.preventDefault();
      clearMsg('msg-signin');
      const email = document.getElementById('si-email').value.trim();
      const password = document.getElementById('si-password').value;

      setLoading('btn-signin', true, 'Sign In');

      const sb = await getClient();
      if (!sb) {
        showMsg('msg-signin', 'Unable to connect to authentication service. Please try again.', 'error');
        setLoading('btn-signin', false, 'Sign In');
        return;
      }

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showMsg('msg-signin', error.message, 'error');
        setLoading('btn-signin', false, 'Sign In');
        return;
      }

      window.location.href = 'index.html';
    }

    // --- Sign Up ---
    async function handleSignUp(e) {
      e.preventDefault();
      clearMsg('msg-signup');
      const inviteCode = document.getElementById('su-invite').value.trim();
      const name = document.getElementById('su-name').value.trim();
      const email = document.getElementById('su-email').value.trim();
      const password = document.getElementById('su-password').value;
      const confirm = document.getElementById('su-confirm').value;

      if (!inviteCode) {
        showMsg('msg-signup', 'An invitation code is required to create an account.', 'error');
        return;
      }

      if (password !== confirm) {
        showMsg('msg-signup', 'Passwords do not match.', 'error');
        return;
      }

      setLoading('btn-signup', true, 'Create Account');

      const sb = await getClient();
      if (!sb) {
        showMsg('msg-signup', 'Unable to connect to authentication service. Please try again.', 'error');
        setLoading('btn-signup', false, 'Create Account');
        return;
      }

      // Validate invitation code
      const { data: invite, error: inviteErr } = await sb
        .from('invite_codes')
        .select('id, code, max_uses, times_used, role')
        .eq('code', inviteCode.toUpperCase())
        .eq('is_active', true)
        .single();

      if (inviteErr || !invite) {
        showMsg('msg-signup', 'Invalid or expired invitation code.', 'error');
        setLoading('btn-signup', false, 'Create Account');
        return;
      }

      if (invite.max_uses > 0 && invite.times_used >= invite.max_uses) {
        showMsg('msg-signup', 'This invitation code has reached its usage limit.', 'error');
        setLoading('btn-signup', false, 'Create Account');
        return;
      }

      // Code is valid — proceed with signup
      const assignedRole = invite.role || 'practitioner';
      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: {
          data: { full_name: name, role: assignedRole },
          emailRedirectTo: window.location.origin + '/confirm.html'
        }
      });

      if (error) {
        showMsg('msg-signup', error.message, 'error');
        setLoading('btn-signup', false, 'Create Account');
        return;
      }

      // Increment usage count on the invite code
      await sb.from('invite_codes')
        .update({ times_used: invite.times_used + 1 })
        .eq('id', invite.id);

      setLoading('btn-signup', false, 'Create Account');
      showMsg('msg-signup', 'Account created! Check your email for a confirmation link.', 'success');
    }

    // --- Forgot Password ---
    async function handleForgot(e) {
      e.preventDefault();
      clearMsg('msg-forgot');
      const email = document.getElementById('fp-email').value.trim();

      setLoading('btn-forgot', true, 'Send Reset Link');

      const sb = await getClient();
      if (!sb) {
        showMsg('msg-forgot', 'Unable to connect to authentication service. Please try again.', 'error');
        setLoading('btn-forgot', false, 'Send Reset Link');
        return;
      }

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/confirm.html'
      });

      if (error) {
        showMsg('msg-forgot', error.message, 'error');
        setLoading('btn-forgot', false, 'Send Reset Link');
        return;
      }

      setLoading('btn-forgot', false, 'Send Reset Link');
      showMsg('msg-forgot', 'Reset link sent! Check your email inbox.', 'success');
    }

    // --- Redirect if already logged in ---
    (async function checkSession() {
      const sb = await getClient();
      if (!sb) return;
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'index.html';
    })();
  </script>
</body>
</html>
